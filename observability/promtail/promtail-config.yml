server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://host.docker.internal:3100/loki/api/v1/push

scrape_configs:

  - job_name: microservices

    static_configs:

      - targets:
          - localhost

        labels:
          job: order-service
          service: order-service
          __path__: /logs/order-service.log

      - targets:
          - localhost

        labels:
          job: inventory-service
          service: inventory-service
          __path__: /logs/inventory-service.log

      - targets:
          - localhost

        labels:
          job: payment-service
          service: payment-service
          __path__: /logs/payment-service.log

      - targets:
          - localhost

        labels:
          job: shipment-service
          service: shipment-service
          __path__: /logs/shipment-service.log

      - targets:
          - localhost

        labels:
          job: return-service
          service: return-service
          __path__: /logs/return-service.log