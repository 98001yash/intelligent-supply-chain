
  jwt:
    secretKey: vsjkfuishvruiuhuwrfutgvvbdfilviudvhakdfofureghrevnfskjvieghegkdsldlsfosjfirfreiohfrfkdsfdsugfudsfmdsnvbsfkbjgreighurhlsfjoifjrojvdsmvvbfjihurfhrufhuladfoadfjflisjfreierfrefjri

  server:
    port: 8081

  spring:
    application:
      name: api-gateway

    zipkin:
      tracing:
        endpoint: http://localhost:9411/api/v2/spans

    cloud:
      gateway:

        default-filters:
          - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

        globalcors:
          corsConfigurations:
            '[/**]':

              allowedOrigins: "*"

              allowedMethods:
                - GET
                - POST
                - PUT
                - DELETE
                - OPTIONS

              allowedHeaders: "*"

        routes:

          - id: user-service
            uri: lb://USER-SERVICE
            predicates:
              - Path=/auth/**

          - id: order-service
            uri: lb://ORDER-SERVICE
            predicates:
              - Path=/orders/**

          - id: payment-service
            uri: lb://PAYMENT-SERVICE
            predicates:
              - Path=/payments/**

          - id: inventory-service
            uri: lb://INVENTORY-SERVICE
            predicates:
              - Path=/inventory/**

          - id: shipment-service
            uri: lb://SHIPMENT-SERVICE
            predicates:
              - Path=/shipments/**

          - id: return-service
            uri: lb://RETURN-SERVICE
            predicates:
              - Path=/returns/**

          - id: notification-service
            uri: lb://NOTIFICATION-SERVICE
            predicates:
              - Path=/notifications/**

  management:

    tracing:
      sampling:
        probability: 1.0

    endpoint:
      prometheus:
        enabled: true

    endpoints:
      web:
        exposure:
          include: health,info,metrics,prometheus

    metrics:
      tags:
        application: ${spring.application.name}

  feign:
    hystrix:
      enabled: true

  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/

    instance:
      prefer-ip-address: true

  logging:
    level:
      root: INFO

      org.springframework.cloud.gateway: INFO
      reactor.netty.http.client: INFO
      reactor.netty.http.server: INFO
